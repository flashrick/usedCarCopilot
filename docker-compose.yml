services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: used-car-copilot-postgres
    environment:
      POSTGRES_DB: used_car_copilot
      POSTGRES_USER: used_car
      POSTGRES_PASSWORD: used_car
    ports:
      - "5432:5432"
    volumes:
      - used_car_copilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U used_car -d used_car_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: used-car-copilot-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://used_car:used_car@postgres:5432/used_car_copilot}
      SEED_DATA_DIR: ${SEED_DATA_DIR:-data/seed}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local_hash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-local-hash-embedding-v1}
      RECOMMENDATION_PROVIDER: ${RECOMMENDATION_PROVIDER:-deterministic}
      RECOMMENDATION_MODEL: ${RECOMMENDATION_MODEL:-deterministic_ranker_with_citations}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
      AI_API_KEY: ${AI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.ai/v1}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status == 200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://api:8000
    container_name: used-car-copilot-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  used_car_copilot_pgdata:
